name: Node CI

# PR-time node-ci is provided by the required gate (stack: node), which runs
# the same reusable lane — a pull_request trigger here double-ran full CI on
# every code-PR push (#302; mirrors hudson-bend#295). This caller now covers
# post-merge main only.
on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-success:
    uses: ArchonVII/github-workflows/.github/workflows/node-ci.yml@v1
    with:
      node-versions: '["22"]'
      install-command: npm install
      cache: ""
      lint-script: ""
      typecheck-script: ""
      test-script: test
