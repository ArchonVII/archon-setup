# Copy this file to `.github/workflows/actionlint.yml` in any consumer repo.
# Triggers on PRs that touch workflow files or .githooks/, and on push to
# main. The reusable workflow upstream pins the actionlint binary version.

name: Actionlint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".githooks/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".githooks/**"

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    uses: ArchonVII/github-workflows/.github/workflows/actionlint.yml@v1
    # with:
    #   actionlint-version: "1.7.7"
    #   fail-on-error: true
    #   shellcheck-enabled: true
